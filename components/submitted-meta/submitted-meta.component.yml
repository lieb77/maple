$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json
name: Submitted Metadata
status: experimental
description: "Displays the 'Submitted by' line with IndieWeb microformats (h-card, dt-published)."

props:
  type: object
  properties:
    author_name:
      type: string
      title: Author Name
      description: "The display name of the node owner."
    author_url:
      type: string
      title: Author URL
      description: "The absolute URL to the author's profile (usually the homepage for IndieWeb)."
    iso_datetime:
      type: string
      title: ISO 8601 Date
      description: "The machine-readable date string (e.g., 2026-02-23T08:16:58-08:00)."
    long_date:
      type: string
      title: Human Readable Date
      description: "The formatted date string (e.g., Monday, February 23, 2026 - 08:16)."
