bootstrap:
  remote: https://github.com/twbs/bootstrap
  version: 5.3.3
  license:
    name: MIT
    url: https://github.com/twbs/bootstrap/blob/main/LICENSE
    gpl-compatible: true
  css:
    theme:
      /libraries/bootstrap/dist/css/bootstrap.min.css: { minified: true }
  js:
    /libraries/bootstrap/dist/js/bootstrap.bundle.min.js: { minified: true }

fontawesome_brands:
  remote: https://fontawesome.com/
  version: 7.0.1
  license:
    name: MIT
    url: https://fontawesome.com/license/free
    gpl-compatible: true
  css:
    theme:
      # FontAwesome 7 core
      https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css: { type: external, minified: true }
      # Solid icons (for fa-link)
      https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/solid.min.css: { type: external, minified: true }
      # Brand icons (for Bluesky, etc)
      https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css: { type: external, minified: true }

